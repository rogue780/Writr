name: writr
description: A Scrivener-compatible Android app for reading and writing .scrivx/.scriv projects with cloud storage integration.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.6

  # State Management
  provider: ^6.1.1

  # File handling via Storage Access Framework
  path_provider: ^2.1.2
  path: ^1.8.3
  file_picker: ^6.1.1

  # XML parsing for Scrivener files
  xml: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  # assets:
  #   - assets/images/
